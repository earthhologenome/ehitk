name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and test dependencies
        run: python -m pip install ".[dev]" build

      - name: Run test suite
        run: python -m pytest

      - name: Build sdist and wheel
        run: python -m build

      - name: Smoke test installed CLI
        run: |
          ehitk --help
          ehitk metagenomes query --host-species "Podarcis muralis" --limit 1
          ehitk mags query --genus Escherichia --limit 1

